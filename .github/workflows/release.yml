name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: build distributions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Build
        run: uv build

      - name: Smoke test wheel
        run: |
          wheel_packages=(dist/*.whl)
          uv run --isolated --no-project --with dist/*.whl omf --help
          uv run --isolated --no-project --with dist/*.whl omf doctor --json
          uv run --isolated --no-project --with dist/*.whl omf install skill --runtime generic --out /tmp/omf-wheel-skill
          uv run --isolated --no-project --with dist/*.whl omf install mcp --client generic --out /tmp/omf-wheel-mcp.json
          bash scripts/smoke-default-flow.sh "${wheel_packages[0]}"

      - name: Smoke test pipx wheel install
        run: |
          wheel_packages=(dist/*.whl)
          python -m pip install --user pipx
          export PIPX_HOME="$RUNNER_TEMP/pipx-home"
          export PIPX_BIN_DIR="$RUNNER_TEMP/pipx-bin"
          mkdir -p "$PIPX_HOME" "$PIPX_BIN_DIR"
          export PATH="$PIPX_BIN_DIR:$PATH"
          python -m pipx install "${wheel_packages[0]}"
          omf --help
          omf doctor --json
          omf install skill --runtime generic --scope export --out "$RUNNER_TEMP/omf-pipx-skill"
          omf install mcp --client generic --scope export --out "$RUNNER_TEMP/omf-pipx-mcp.json"

      - name: Smoke test sdist
        run: |
          sdist_packages=(dist/*.tar.gz)
          uv run --isolated --no-project --with dist/*.tar.gz omf --help
          uv run --isolated --no-project --with dist/*.tar.gz omf doctor --json
          uv run --isolated --no-project --with dist/*.tar.gz omf install skill --runtime generic --out /tmp/omf-sdist-skill
          uv run --isolated --no-project --with dist/*.tar.gz omf install mcp --client generic --out /tmp/omf-sdist-mcp.json
          bash scripts/smoke-default-flow.sh "${sdist_packages[0]}"

      - name: Create checksums
        run: shasum -a 256 dist/* > SHA256SUMS

      - name: Upload distributions
        uses: actions/upload-artifact@v6
        with:
          name: python-package-distributions
          path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Upload checksums
        uses: actions/upload-artifact@v6
        with:
          name: python-package-checksums
          path: SHA256SUMS

  github-release:
    name: upload GitHub release artifacts
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Download checksums
        uses: actions/download-artifact@v6
        with:
          name: python-package-checksums
          path: dist/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-testpypi:
    name: publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: testpypi
      url: https://test.pypi.org/p/oh-my-field
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: publish-testpypi
    if: ${{ !contains(github.ref_name, 'a') && !contains(github.ref_name, 'b') && !contains(github.ref_name, 'rc') }}
    environment:
      name: pypi
      url: https://pypi.org/p/oh-my-field
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
