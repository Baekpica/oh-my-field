name: Codex Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  issue_comment:
    types:
      - created

concurrency:
  group: codex-review-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    outputs:
      should_run: ${{ steps.prepare.outputs.should_run }}
      pr_number: ${{ steps.prepare.outputs.pr_number }}
      base_ref: ${{ steps.prepare.outputs.base_ref }}
      additional_context: ${{ steps.prepare.outputs.additional_context }}
      skip_reason: ${{ steps.prepare.outputs.skip_reason }}
    steps:
      - name: Prepare Codex review context
        id: prepare
        uses: actions/github-script@v7
        with:
          script: |
            const trustedAssociations = new Set(["OWNER", "MEMBER", "COLLABORATOR"]);
            const { owner, repo } = context.repo;
            const eventName = context.eventName;

            let pr = null;
            let shouldRun = false;
            let additionalContext = "";
            let skipReason = "";

            if (eventName === "pull_request") {
              pr = context.payload.pull_request;
              shouldRun = true;
            } else if (eventName === "issue_comment") {
              const issue = context.payload.issue;
              const comment = context.payload.comment;
              const body = (comment.body || "").trim();
              const commandMatch = body.match(/^@codex\s+\/review\b([\s\S]*)$/i);

              if (!issue.pull_request) {
                skipReason = "comment is not on a pull request";
              } else if (!commandMatch) {
                skipReason = "comment is not a Codex review command";
              } else if (!trustedAssociations.has(comment.author_association)) {
                skipReason = "comment author is not trusted";
              } else {
                const response = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: issue.number,
                });
                pr = response.data;
                shouldRun = true;
                additionalContext = commandMatch[1].trim();
              }
            } else {
              skipReason = `unsupported event: ${eventName}`;
            }

            if (pr?.draft) {
              shouldRun = false;
              skipReason = "pull request is a draft";
            }

            if (pr?.head?.repo?.fork) {
              shouldRun = false;
              skipReason = "pull request comes from a fork";
            }

            core.setOutput("should_run", String(shouldRun));
            core.setOutput("pr_number", pr?.number ? String(pr.number) : "");
            core.setOutput("base_ref", pr?.base?.ref || "");
            core.setOutput("additional_context", additionalContext);
            core.setOutput("skip_reason", skipReason);

  codex:
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.should_run == 'true' }}
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Checkout pull request head
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_BASE_REF: ${{ needs.prepare.outputs.base_ref }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
        run: |
          auth_header="$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 | tr -d '\n')"
          git \
            -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $auth_header" \
            fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head:refs/remotes/origin/pr/$PR_NUMBER/head"
          git checkout --detach "refs/remotes/origin/pr/$PR_NUMBER/head"

      - name: Build Codex review prompt
        env:
          ADDITIONAL_CONTEXT: ${{ needs.prepare.outputs.additional_context }}
          PR_BASE_REF: ${{ needs.prepare.outputs.base_ref }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          mkdir -p .github/codex/runtime
          {
            printf 'Repository: %s\n' "$REPOSITORY"
            printf 'Pull request: #%s\n' "$PR_NUMBER"
            printf 'Base ref: origin/%s\n' "$PR_BASE_REF"
            printf 'Head ref: HEAD\n'
            printf 'Action run: %s\n' "$RUN_URL"
            printf '\nAdditional user context:\n'
            if [ -n "$ADDITIONAL_CONTEXT" ]; then
              printf '%s\n' "$ADDITIONAL_CONTEXT"
            else
              printf 'None.\n'
            fi
            printf '\n'
            cat .github/codex/prompts/review.md
          } > .github/codex/runtime/review-prompt.md

      - name: Run Codex pull request review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/runtime/review-prompt.md
          codex-args: '["--ephemeral"]'
          sandbox: read-only
          safety-strategy: drop-sudo

  post_review:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - codex
    if: ${{ needs.prepare.outputs.should_run == 'true' && needs.codex.outputs.final_message != '' }}
    permissions:
      pull-requests: write
    steps:
      - name: Post Codex review
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const runUrl = process.env.RUN_URL;
            let reviewBody = (process.env.CODEX_FINAL_MESSAGE || "").trim();

            if (!reviewBody) {
              core.info("Codex produced an empty review body; skipping.");
              return;
            }

            const footer = `\n\n---\nCodex review generated by [GitHub Actions](${runUrl}).`;
            const maxLength = 60000;
            if (reviewBody.length + footer.length > maxLength) {
              reviewBody = `${reviewBody.slice(0, maxLength - footer.length - 80)}\n\n[Review truncated because it exceeded the GitHub comment limit.]`;
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              event: "COMMENT",
              body: `${reviewBody}${footer}`,
            });
